<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Practice Hub</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load PapaParse for CSV handling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* Apply Inter font and basic styling */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        .tab-button {
            @apply px-4 py-2 text-sm font-medium transition-colors duration-200 rounded-lg;
        }
        .tab-button.active {
            @apply bg-indigo-600 text-white shadow-md;
        }
        .tab-button:not(.active) {
            @apply text-gray-700 hover:bg-indigo-100;
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8">

    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-6 text-center">
            Language Practice Hub
        </h1>
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-200">
            <!-- Tab Navigation -->
            <div id="tabs" class="flex space-x-2 p-2 bg-gray-50 rounded-xl mb-6">
                <!-- Buttons rendered by JS -->
            </div>

            <div id="app-container">
                <!-- Loading content -->
                <div id="loading-spinner" class="flex flex-col items-center justify-center p-8 text-gray-500">
                    <svg class="w-8 h-8 animate-spin text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="mt-4 text-lg font-medium">Loading data from 3 Google Sheets...</p>
                    <div id="status-display" class="mt-2 text-sm text-center"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module">
        // --- Configuration (Your Three Sheet Links) ---
        const DATA_SOURCES = {
            'Sentence Practice': {
                url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTeenmRJ1Gqolo-8KqU5A84PProbYHoY3SrXKFxFgdzwf_FdmJnpfbpEf9KmbhqhQk17K6USG_UOJg9/pub?output=csv',
                parser: 'sentences' // Use specialized parser
            },
            'Vocabulary List': {
                url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNeq329ih6SxLZ2TowPzpk61gJLFy-UAVAb8ivBs9DNEOdmtRQ29bWh__n53MdE-C8hs_XOV3iIkT/pub?output=csv',
                parser: 'simple'
            },
            'Reading/Listening': {
                url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRvNFlHDx-4cZbDzwKy5Yb_DKeSxS2wSXxyX1Ua6pGcf27yFjmqOPz9jQ_rzoV3-zoZI9lw4EIfmdXH/pub?output=csv',
                parser: 'simple'
            }
        };

        // --- Application State ---
        let allData = {}; // Stores data from all three sheets: { 'Activity Name': { data: [], topics: [] } }
        let currentActivity = 'Sentence Practice'; // Default view
        let isLoading = true;
        let loadStatuses = {};

        // Sentence Practice Specific State (kept separate for clarity)
        let sentenceData = [];
        let sentenceTopics = ['all'];
        let selectedTopic = 'all';
        let currentSentenceIndex = 0;
        let isCorrect = null;
        let typedText = '';

        // --- Data Fetching and Parsing ---

        /**
         * Specialized parser for the Sentence Spreadsheet format.
         * Theme in A, Topic in B, Sentence in D.
         */
        const parseSentencesCSV = (csvData) => {
            const parsedSentences = [];
            const uniqueTopics = new Set(['all']);

            let currentTheme = 'General';
            let currentTopic = 'Miscellaneous';

            csvData.forEach(row => {
                if (row.length < 5) return; 

                const colA = (row[0] || '').trim(); // Theme
                const colB = (row[1] || '').trim(); // Topic
                const colD = (row[3] || '').trim(); // Target Sentence
                const colE = (row[4] || '').trim(); // Optional Hint

                // 1. Update Theme (Column A)
                if (colA) {
                    currentTheme = colA;
                }
                // 2. Update Topic (Column B)
                if (colB) {
                    currentTopic = colB;
                }
                // 3. Extract Sentence (Column D)
                if (colD) {
                    parsedSentences.push({
                        text: colD,
                        topic: currentTopic,
                        theme: currentTheme,
                        hint: colE || ''
                    });
                    uniqueTopics.add(currentTopic);
                }
            });

            // Update global sentence state
            sentenceData = parsedSentences.sort((a, b) => a.topic.localeCompare(b.topic));
            sentenceTopics = Array.from(uniqueTopics).sort();
            
            return {
                data: sentenceData,
                topics: sentenceTopics
            };
        };
        
        /** Simple parser for Vocab/Reading/Listening sheets (assumes row-by-row data). */
        const parseSimpleCSV = (csvData) => {
            // Returns raw data for simple rendering/inspection in the other tabs
            return { data: csvData }; 
        };

        const fetchAllData = async () => {
            const dataPromises = Object.entries(DATA_SOURCES).map(([name, config]) => {
                return new Promise((resolve) => {
                    Papa.parse(config.url, {
                        download: true,
                        header: false,
                        skipEmptyLines: true,
                        complete: (results) => {
                            let parsedData = {};
                            if (results.data.length > 0) {
                                if (config.parser === 'sentences') {
                                    parsedData = parseSentencesCSV(results.data);
                                } else {
                                    parsedData = parseSimpleCSV(results.data);
                                }
                                loadStatuses[name] = { status: 'SUCCESS', count: parsedData.data.length };
                            } else {
                                loadStatuses[name] = { status: 'ERROR', message: 'No data found.' };
                            }
                            allData[name] = parsedData;
                            resolve();
                        },
                        error: (error) => {
                            console.error(`Error loading ${name}:`, error);
                            loadStatuses[name] = { status: 'ERROR', message: `Failed to load: ${error.message}` };
                            resolve(); // Resolve anyway so other sheets can load
                        }
                    });
                });
            });

            await Promise.all(dataPromises);
            isLoading = false;
            renderApp();
        };

        // --- Core UI Rendering Logic ---

        const setActiveTab = (activityName) => {
            currentActivity = activityName;
            renderApp();
        };

        const renderTabs = () => {
            const tabsContainer = document.getElementById('tabs');
            if (!tabsContainer) return;

            tabsContainer.innerHTML = Object.keys(DATA_SOURCES).map(name => `
                <button
                    onclick="setActiveTab('${name}')"
                    class="tab-button ${currentActivity === name ? 'active' : ''}"
                >
                    ${name}
                </button>
            `).join('');
        };

        const renderSentencePractice = (container) => {
            const filteredSentences = getFilteredSentences();
            const currentSentence = filteredSentences[currentSentenceIndex];
            const displaySentence = currentSentence ? currentSentence.text : 'No sentence loaded.';
            const filteredCount = filteredSentences.length;
            const currentTheme = currentSentence ? currentSentence.theme : 'N/A';
            const currentTopic = currentSentence ? currentSentence.topic : 'N/A';

            // Generate Topic Selector Options
            const optionsHtml = sentenceTopics.map(t => `
                <option value="${t}" ${t === selectedTopic ? 'selected' : ''}>
                    ${t.charAt(0).toUpperCase() + t.slice(1)}
                </option>
            `).join('');

            // Generate Feedback HTML
            let feedbackHtml = '';
            if (isCorrect !== null) {
                const feedbackClass = isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                const icon = isCorrect ? 
                    `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>` : 
                    `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004 12m16 0A8.001 8.001 0 004 12"></path></svg>`;
                
                if (isCorrect) {
                    feedbackHtml = `
                        <div class="p-4 mt-4 rounded-xl font-semibold transition-all duration-300 ${feedbackClass}">
                            <div class="flex items-center">
                                ${icon} Correct! Great job.
                            </div>
                        </div>
                    `;
                } else {
                    feedbackHtml = `
                        <div class="p-4 mt-4 rounded-xl font-semibold transition-all duration-300 ${feedbackClass}">
                            <div class="flex items-center mb-2">
                                ${icon} Incorrect. Try again or check the answer.
                            </div>
                            <p class="text-sm font-medium">
                                Expected: <span class="font-mono bg-red-200/50 p-1 rounded break-words">${currentSentence.text}</span>
                            </p>
                        </div>
                    `;
                }
            }
            
            if (sentenceData.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-gray-500 rounded-xl">
                        <svg class="w-12 h-12 mx-auto text-indigo-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2m-9 0V3h4v2m-4 0h4"></path></svg>
                        <h2 class="text-xl font-bold">No Sentences Found</h2>
                        <p class="mt-2">
                            Please check your sheet and ensure data is properly formatted: **Theme in A, Topic in B, Sentence in D**.
                        </p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <!-- Theme and Topic Info -->
                <p class="text-sm text-center text-indigo-500 font-medium mb-4">
                    Theme: ${currentTheme} | Topic: ${currentTopic}
                </p>
                
                <!-- Topic Selector (Dropdown Menu) -->
                <div class="relative w-full mb-8">
                    <label for="topic-select" class="block mb-1 text-sm font-medium text-gray-700">Filter by Topic</label>
                    <div class="relative">
                        <select
                            id="topic-select"
                            onchange="handleTopicChange(event)"
                            class="block w-full appearance-none bg-white border border-gray-300 rounded-xl py-3 pl-4 pr-10 text-gray-800 shadow-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow duration-150 cursor-pointer font-medium"
                        >
                            ${optionsHtml}
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="p-6 md:p-8 bg-white rounded-xl shadow-2xl transition-all duration-300 border border-gray-100">
                    <h2 class="text-xl font-bold text-indigo-600 mb-4">
                        Sentence to Replicate
                    </h2>

                    <!-- Sentence to Replicate -->
                    <div class="min-h-[80px] p-4 mb-6 text-2xl font-light italic text-gray-700 bg-gray-50 border-l-4 border-indigo-400 rounded-lg select-none">
                        ${displaySentence}
                    </div>

                    <!-- User Input Area -->
                    <div class="relative w-full">
                        <textarea
                            id="typed-text-area"
                            oninput="handleInput(event)"
                            placeholder="Type the sentence here..."
                            rows="3"
                            class="w-full resize-none text-lg text-gray-800 focus:outline-none bg-white border border-gray-300 rounded-xl py-3 px-4 shadow-md focus:ring-2 focus:ring-indigo-500 transition-all duration-150"
                        >${typedText}</textarea>
                    </div>

                    <!-- Feedback -->
                    ${feedbackHtml}
                </div>

                <!-- Control Buttons -->
                <div class="flex space-x-4 mt-6">
                    <button
                        onclick="handleCheck()"
                        ${!currentSentence || typedText.trim().length === 0 ? 'disabled' : ''}
                        class="flex-1 px-6 py-3 font-semibold text-white transition-all duration-200 rounded-xl shadow-lg transform hover:scale-[1.02] active:scale-[0.98] ${!currentSentence || typedText.trim().length === 0 ? 'bg-gray-400 cursor-not-allowed shadow-none' : 'bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 shadow-indigo-500/50'}"
                    >
                        <svg class="inline w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Check
                    </button>
                    <button
                        onclick="handleNextSentence()"
                        class="flex-1 px-6 py-3 font-semibold text-white transition-all duration-200 rounded-xl shadow-lg transform hover:scale-[1.02] active:scale-[0.98] bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 shadow-indigo-500/50"
                    >
                        <svg class="inline w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004 12m16 0A8.001 8.001 0 004 12"></path></svg> Next Sentence
                    </button>
                </div>

                <p class="text-sm mt-4 text-center text-gray-400">
                    Sentence ${currentSentenceIndex + 1} of ${filteredCount} (Total loaded: ${sentenceData.length})
                </p>
            `;
        };

        const renderSimpleDataView = (container, dataKey, title) => {
            const data = allData[dataKey]?.data || [];
            const rowCount = data.length;
            const headers = rowCount > 0 ? data[0] : [];
            const rows = data.slice(1); // Exclude header row if present

            container.innerHTML = `
                <div class="p-4">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${title} (${rowCount} rows loaded)</h2>
                    <p class="text-gray-600 mb-4">This view displays the raw data loaded from your **${title}** sheet.</p>
                    
                    ${rowCount === 0 ? 
                        `<div class="text-center py-12 text-gray-500 border border-dashed rounded-lg">No usable data found in this sheet.</div>` :
                        `<div class="overflow-x-auto rounded-lg shadow-md border">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-indigo-50 sticky top-0">
                                    <tr>
                                        ${headers.map((h, i) => `<th class="px-3 py-2 text-left text-xs font-semibold text-indigo-700 uppercase tracking-wider">${h || \`Col \${i+1}\`}</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-100">
                                    ${rows.map(row => `
                                        <tr>
                                            ${row.map(cell => `<td class="px-3 py-2 whitespace-nowrap text-sm text-gray-800">${cell}</td>`).join('')}
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>`
                    }
                </div>
            `;
        };
        
        const renderApp = () => {
            const container = document.getElementById('app-container');
            const spinner = document.getElementById('loading-spinner');
            const statusDisplay = document.getElementById('status-display');

            if (isLoading) {
                if (spinner) spinner.style.display = 'flex';
                statusDisplay.innerHTML = Object.entries(loadStatuses).map(([name, status]) => {
                    let color = 'text-yellow-600';
                    if (status.status === 'SUCCESS') color = 'text-green-600';
                    if (status.status === 'ERROR') color = 'text-red-600';
                    return `<p class="${color}">${name}: ${status.status} ${status.count !== undefined ? `(${status.count} items)` : ''}</p>`;
                }).join('');
                return;
            }

            if (spinner) spinner.style.display = 'none';
            renderTabs();
            
            // Render content based on active tab
            container.innerHTML = ''; // Clear previous content

            if (currentActivity === 'Sentence Practice') {
                renderSentencePractice(container);
            } else if (currentActivity === 'Vocabulary List') {
                renderSimpleDataView(container, 'Vocabulary List', 'Vocabulary List');
            } else if (currentActivity === 'Reading/Listening') {
                renderSimpleDataView(container, 'Reading/Listening', 'Reading and Listening Resources');
            }
        };

        // --- Global Event Handlers for Sentence Practice ---

        window.setActiveTab = setActiveTab; // Make accessible globally

        window.handleTopicChange = (event) => {
            selectedTopic = event.target.value;
            currentSentenceIndex = 0;
            isCorrect = null;
            typedText = '';
            renderApp();
        };

        window.handleInput = (event) => {
            typedText = event.target.value;
            isCorrect = null; 
            
            // Manually update check button state
            const checkBtn = document.querySelector('button[onclick="handleCheck()"]');
            if (checkBtn) {
                const currentSentence = getFilteredSentences()[currentSentenceIndex];
                checkBtn.disabled = !currentSentence || typedText.trim().length === 0;

                // Simple manual removal of feedback
                const feedbackEl = document.querySelector('.p-4.mt-4.rounded-xl');
                if (feedbackEl) feedbackEl.remove();
            }
        };

        window.handleCheck = () => {
            const currentSentence = getFilteredSentences()[currentSentenceIndex];
            if (!currentSentence || typedText.trim() === '') return;

            const requiredText = (currentSentence.text || '').trim().toLowerCase();
            const userText = typedText.trim().toLowerCase();

            isCorrect = (userText === requiredText);
            renderApp();
        };

        window.handleNextSentence = () => {
            const filtered = getFilteredSentences();
            if (filtered.length === 0) return;

            currentSentenceIndex = (currentSentenceIndex + 1) % filtered.length;
            isCorrect = null;
            typedText = '';
            renderApp();
            
            setTimeout(() => {
                const textarea = document.getElementById('typed-text-area');
                if(textarea) textarea.focus();
            }, 50);
        };
        
        const getFilteredSentences = () => {
            if (selectedTopic === 'all') {
                return sentenceData;
            }
            return sentenceData.filter(s => s.topic === selectedTopic);
        };

        // --- Start the application ---
        window.onload = fetchAllData;

    </script>
</body>
</html>
