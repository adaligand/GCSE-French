<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary List Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding-top: 40px;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 800px;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .controls, #test-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        label {
            font-weight: bold;
        }
        select, button {
            font-size: 1em;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #3498db;
        }
        #reveal-btn {
            background-color: #27ae60;
        }
        #reveal-btn:hover {
            background-color: #2ecc71;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f9f9f9;
        }
        td.num-cell {
            width: 10px;
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
        }
        .answer-cell {
            min-height: 1.5em;
        }
        .answer-cell span {
            visibility: hidden;
            color: #27ae60;
            font-weight: bold;
        }
        .answer-cell span.visible {
            visibility: visible;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">Vocabulary List Generator</h1>
    <p id="loading-message" style="text-align:center;">Loading sets from your spreadsheet...</p>

    <div id="controls-container" class="controls hide">
        <label for="theme-select">Theme:</label>
        <select id="theme-select"></select>
        <label for="set-select">Set:</label>
        <select id="set-select"></select>
        <button id="generate-btn">Generate List</button>
    </div>

    <div id="test-container" class="hide">
        <hr>
        <table>
            <thead>
                <tr>
                    <th>No.</th>
                    <th>French</th>
                    <th>English</th>
                </tr>
            </thead>
            <tbody id="test-body"></tbody>
        </table>
        <div id="test-controls">
             <button id="reveal-btn">Reveal Answers</button>
        </div>
    </div>
</div>

<script>
    const loadingMessage = document.getElementById('loading-message');
    const controlsContainer = document.getElementById('controls-container');
    const themeSelect = document.getElementById('theme-select');
    const setSelect = document.getElementById('set-select');
    const generateBtn = document.getElementById('generate-btn');
    const testContainer = document.getElementById('test-container');
    const testBody = document.getElementById('test-body');
    const revealBtn = document.getElementById('reveal-btn');

    let vocabSets = {};

    // Map theme numbers to their full names
    const themeMap = {
        '1': '1-Personal world',
        '2': '2-Lifestyle',
        '3': '3-Neighbourhood',
        '4': '4-Media & Tech',
        '5': '5-Study & future',
        '6': '6-Travel and Tourism'
    };

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const sheetUrl = params.get('sheet');
        if (!sheetUrl) {
            loadingMessage.textContent = "⚠️ Please provide a Google Sheet URL in the '?sheet=' parameter.";
            return;
        }

        Papa.parse(sheetUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: (results) => {
                let currentSetName = null;
                let currentSetWords = [];

                results.data.forEach(row => {
                    const setNameInRow = row[0] ? row[0].trim() : ''; // Column A
                    const frenchWord = row[2] ? row[2].trim() : ''; // Column C
                    const englishWord = row[3] ? row[3].trim() : ''; // Column D

                    if (setNameInRow !== '') {
                        if (currentSetName && currentSetWords.length > 0) {
                            vocabSets[currentSetName] = currentSetWords;
                        }
                        currentSetName = setNameInRow;
                        currentSetWords = [];
                    }

                    if (frenchWord !== '' && englishWord !== '') {
                        currentSetWords.push({ french: frenchWord, english: englishWord });
                    }
                });

                if (currentSetName && currentSetWords.length > 0) {
                    vocabSets[currentSetName] = currentSetWords;
                }
                
                if (Object.keys(vocabSets).length > 0) {
                    initializeSelectors();
                    loadingMessage.classList.add('hide');
                    controlsContainer.classList.remove('hide');
                } else {
                    loadingMessage.textContent = "⚠️ No vocabulary sets found. Check Columns A, C, and D in your sheet.";
                }
            },
            error: () => {
                loadingMessage.textContent = "⚠️ Failed to load spreadsheet. Check the URL and publish settings.";
            }
        });

        generateBtn.addEventListener('click', generateTest);
        revealBtn.addEventListener('click', revealAnswers);
        themeSelect.addEventListener('change', updateSetDropdown);
    });

    function initializeSelectors() {
        const themes = [...new Set(Object.keys(vocabSets).map(setName => setName.split('.')[0]))];
        
        themeSelect.innerHTML = '';
        themes.sort((a, b) => a - b).forEach(theme => { // Sort themes numerically
            const option = document.createElement('option');
            option.value = theme;
            // Use the map to get the full name, or fall back to a default format
            option.textContent = themeMap[theme] || `Theme ${theme}`;
            themeSelect.appendChild(option);
        });

        updateSetDropdown();
    }

    function updateSetDropdown() {
        const selectedTheme = themeSelect.value;
        setSelect.innerHTML = '';

        Object.keys(vocabSets).sort().forEach(setName => { // Sort set names alphabetically
            if (setName.startsWith(selectedTheme + '.') || setName === selectedTheme) {
                 const option = document.createElement('option');
                 option.value = setName;
                 option.textContent = `${setName} (${vocabSets[setName].length} words)`;
                 setSelect.appendChild(option);
            }
        });
    }

    function generateTest() {
        const selectedSetName = setSelect.value;
        if (!selectedSetName) return;

        const selectedSet = vocabSets[selectedSetName];
        if (!selectedSet || selectedSet.length === 0) return;

        const shuffled = [...selectedSet].sort(() => 0.5 - Math.random());
        const testItems = shuffled.slice(0, 10);

        testBody.innerHTML = '';
        
        const numTotalQuestions = testItems.length;
        const numFrenchQuestions = Math.ceil(numTotalQuestions / 2);
        
        for (let i = 0; i < numTotalQuestions; i++) {
            const item = testItems[i];
            const row = document.createElement('tr');
            
            if (i < numFrenchQuestions) {
                row.innerHTML = `
                    <td class="num-cell">${i + 1}</td>
                    <td>${item.french}</td>
                    <td class="answer-cell"><span class="answer">${item.english}</span></td>
                `;
            } 
            else {
                row.innerHTML = `
                    <td class="num-cell">${i + 1}</td>
                    <td class="answer-cell"><span class="answer">${item.french}</span></td>
                    <td>${item.english}</td>
                `;
            }
            testBody.appendChild(row);
        }

        testContainer.classList.remove('hide');
        revealBtn.textContent = 'Reveal Answers';
        document.querySelectorAll('.answer').forEach(span => span.classList.remove('visible'));
    }

    function revealAnswers() {
        const answers = document.querySelectorAll('.answer');
        if (answers.length === 0) return;
        
        const isHidden = !answers[0].classList.contains('visible');
        
        answers.forEach(span => {
            span.classList.toggle('visible', isHidden);
        });

        revealBtn.textContent = isHidden ? 'Hide Answers' : 'Reveal Answers';
    }

</script>

</body>
</html>
