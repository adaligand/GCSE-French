<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary List Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            font-size: 22px;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        h1, h2, #loading-message {
            text-align: center;
        }
        
        /* Styles for the new spreadsheet selector */
        #spreadsheet-selector {
            text-align: center;
        }
        #spreadsheet-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        #spreadsheet-buttons button {
            font-size: 1.2em;
            padding: 15px 30px;
        }
        
        .main-content-wrapper {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }
        .test-panel {
            flex-grow: 1;
        }
        .controls-panel {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .controls-panel h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
        }
        .controls-panel .control-group {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        label {
            font-weight: bold;
        }
        select, button {
            width: 100%;
            font-size: 1em;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #3498db;
        }
        #reveal-btn { background-color: #27ae60; }
        #reveal-btn:hover { background-color: #2ecc71; }
        #print-btn { background-color: #8e44ad; }
        #print-btn:hover { background-color: #9b59b6; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.4em;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            overflow-wrap: break-word;
        }
        th {
            background-color: #f9f9f9;
        }
        th:first-child, td.num-cell {
            width: 60px; 
            text-align: center;
        }
        td.num-cell {
            font-weight: bold;
            color: #7f8c8d;
        }
        .answer-cell span {
            visibility: hidden;
            color: #27ae60;
            font-weight: bold;
        }
        .answer-cell span.visible {
            visibility: visible;
        }
        .hide {
            display: none;
        }

        @media print {
            @page {
                size: landscape;
                margin: 1cm;
            }
            body { font-size: 10pt; padding: 0; margin: 0; }
            .container > *:not(#print-area) { display: none !important; }
            #print-area { display: flex !important; justify-content: space-around; gap: 20px; width: 100%; }
            .print-table-wrapper { width: 48%; page-break-inside: avoid; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="spreadsheet-selector">
        <h2>Select a Class/Language</h2>
        <div id="spreadsheet-buttons">
            </div>
    </div>

    <p id="loading-message" class="hide">Loading sets from your spreadsheet...</p>

    <div class="main-content-wrapper hide">
        <div class="test-panel">
            <div id="test-container" class="hide">
                <table>
                    <thead>
                        <tr><th>No.</th><th>French</th><th>English</th></tr>
                    </thead>
                    <tbody id="test-body"></tbody>
                </table>
            </div>
        </div>
        <div class="controls-panel">
             <h1 id="title">Vocabulary List Generator</h1>
             <div id="setup-controls" class="control-group">
                <label for="theme-select">1. Choose Theme:</label>
                <select id="theme-select"></select>
                <label for="set-select">2. Choose Set:</label>
                <select id="set-select"></select>
                <label for="set-select-2">3. Combine with (Optional):</label>
                <select id="set-select-2"></select>
                <button id="generate-btn">Generate List</button>
            </div>
            <div id="test-controls" class="control-group hide">
                 <button id="reveal-btn">Reveal Answers</button>
                 <button id="print-btn">🖨️ Print Test</button>
            </div>
        </div>
    </div>
    
    <div id="print-area" class="hide"></div>
</div>

<script>
    // --- STEP 1: EDIT YOUR SPREADSHEET LINKS HERE ---
    const spreadsheetMap = {
        'French GCSE': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNeq329ih6SxLZ2TowPzpk61gJLFy-UAVAb8ivBs9DNEOdmtRQ29bWh__n53MdE-C8hs_XOV3iIkT/pub?output=csv',
        'French A Level': 'YOUR_SPANISH_SHEET_URL_HERE',
        'German GCSE': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlddh1-sO5-s5CPJt_a1H1ltX9orRCFvosUPVBJIqjxXc0nB3c4-f19sUNF5s6lIof7TnBIevleWJA/pub?output=csv'
    };

    const loadingMessage = document.getElementById('loading-message');
    const spreadsheetSelector = document.getElementById('spreadsheet-selector');
    const spreadsheetButtons = document.getElementById('spreadsheet-buttons');
    const mainContentWrapper = document.querySelector('.main-content-wrapper');
    const themeSelect = document.getElementById('theme-select');
    const setSelect = document.getElementById('set-select');
    // ... (rest of the element selectors are the same)
    const setSelect2 = document.getElementById('set-select-2');
    const generateBtn = document.getElementById('generate-btn');
    const testContainer = document.getElementById('test-container');
    const testBody = document.getElementById('test-body');
    const testControls = document.getElementById('test-controls');
    const revealBtn = document.getElementById('reveal-btn');
    const printBtn = document.getElementById('print-btn');
    const printArea = document.getElementById('print-area');

    let vocabSets = {};

    const themeMap = {
        '1': '1-Personal world', '2': '2-Lifestyle', '3': '3-Neighbourhood',
        '4': '4-Media & Tech', '5': '5-Study & future', '6': '6-Travel and Tourism'
    };

    document.addEventListener('DOMContentLoaded', () => {
        // Create buttons for each spreadsheet in the map
        for (const name in spreadsheetMap) {
            const button = document.createElement('button');
            button.textContent = name;
            button.addEventListener('click', () => {
                const url = spreadsheetMap[name];
                if (url.includes('YOUR_')) {
                    alert(`Please edit the script to replace the placeholder URL for "${name}".`);
                    return;
                }
                spreadsheetSelector.classList.add('hide');
                loadingMessage.classList.remove('hide');
                loadAndParseSheet(url);
            });
            spreadsheetButtons.appendChild(button);
        }

        generateBtn.addEventListener('click', generateTest);
        revealBtn.addEventListener('click', revealAnswers);
        themeSelect.addEventListener('change', updateSetDropdown);
        printBtn.addEventListener('click', () => window.print());
    });

    function loadAndParseSheet(sheetUrl) {
        // Reset state for new sheet
        vocabSets = {};

        Papa.parse(sheetUrl, {
            download: true, header: false, skipEmptyLines: true,
            complete: (results) => {
                let currentSetName = null;
                let currentSetWords = [];

                results.data.forEach(row => {
                    const setNameInRow = row[0] ? row[0].trim() : '';
                    const frenchWord = row[2] ? row[2].trim() : '';
                    const englishWord = row[3] ? row[3].trim() : '';

                    if (setNameInRow !== '') {
                        if (currentSetName && currentSetWords.length > 0) vocabSets[currentSetName] = currentSetWords;
                        currentSetName = setNameInRow;
                        currentSetWords = [];
                    }
                    if (frenchWord !== '' && englishWord !== '') {
                        currentSetWords.push({ french: frenchWord, english: englishWord });
                    }
                });
                if (currentSetName && currentSetWords.length > 0) vocabSets[currentSetName] = currentSetWords;
                
                if (Object.keys(vocabSets).length > 0) {
                    initializeSelectors();
                    loadingMessage.classList.add('hide');
                    mainContentWrapper.classList.remove('hide');
                } else {
                    loadingMessage.textContent = "⚠️ No vocabulary sets found. Check sheet columns.";
                }
            },
            error: () => { loadingMessage.textContent = "⚠️ Failed to load spreadsheet."; }
        });
    }

    function initializeSelectors() {
        const themes = [...new Set(Object.keys(vocabSets).map(setName => setName.split('.')[0]))];
        themeSelect.innerHTML = '';
        themes.sort((a, b) => a - b).forEach(theme => {
            const option = document.createElement('option');
            option.value = theme;
            option.textContent = themeMap[theme] || `Theme ${theme}`;
            themeSelect.appendChild(option);
        });
        updateSetDropdown();
    }

    function updateSetDropdown() {
        const selectedTheme = themeSelect.value;
        setSelect.innerHTML = '';
        setSelect2.innerHTML = '';

        const noneOption = document.createElement('option');
        noneOption.value = "";
        noneOption.textContent = "-- None --";
        setSelect2.appendChild(noneOption);

        const setsInTheme = Object.keys(vocabSets).filter(setName => setName.startsWith(selectedTheme + '.') || setName === selectedTheme).sort();

        setsInTheme.forEach(setName => {
             const option1 = document.createElement('option');
             option1.value = setName;
             option1.textContent = `${setName} (${vocabSets[setName].length} words)`;
             setSelect.appendChild(option1);
             const option2 = option1.cloneNode(true);
             setSelect2.appendChild(option2);
        });
    }

    function generateTest() {
        const selectedSetName1 = setSelect.value;
        const selectedSetName2 = setSelect2.value;
        if (!selectedSetName1) return;

        let combinedSet = [...vocabSets[selectedSetName1]];
        if (selectedSetName2 && selectedSetName2 !== "") {
            combinedSet = combinedSet.concat(vocabSets[selectedSetName2]);
        }
        
        const uniqueCombinedSet = Array.from(new Map(combinedSet.map(item => [item.french, item])).values());
        if (uniqueCombinedSet.length === 0) return;

        const shuffled = [...uniqueCombinedSet].sort(() => 0.5 - Math.random());
        const frenchQuestionItems = shuffled.slice(0, 5);
        const englishQuestionItems = shuffled.slice(5, 10);

        testBody.innerHTML = '';
        
        frenchQuestionItems.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `<td class="num-cell">${index + 1}</td><td>${item.french}</td><td class="answer-cell"><span class="answer">${item.english}</span></td>`;
            testBody.appendChild(row);
        });

        englishQuestionItems.forEach((item, index) => {
            const row = document.createElement('tr');
            const rowNumber = frenchQuestionItems.length + index + 1;
            row.innerHTML = `<td class="num-cell">${rowNumber}</td><td class="answer-cell"><span class="answer">${item.french}</span></td><td>${item.english}</td>`;
            testBody.appendChild(row);
        });
        
        const onScreenTable = document.querySelector('#test-container table');
        const tableToPrint = onScreenTable.cloneNode(true); 
        const tableHeaderHTML = tableToPrint.querySelector('thead').outerHTML;
        const tableBodyHTML = tableToPrint.querySelector('tbody').innerHTML;
        const fullTableHTML = `<table>${tableHeaderHTML}${tableBodyHTML}</table>`;

        printArea.innerHTML = `
            <div class="print-table-wrapper">${fullTableHTML}</div>
            <div class="print-table-wrapper">${fullTableHTML}</div>
        `;
        
        testContainer.classList.remove('hide');
        testControls.classList.remove('hide');
        revealBtn.textContent = 'Reveal Answers';
        document.querySelectorAll('.answer').forEach(span => span.classList.remove('visible'));
    }

    function revealAnswers() {
        const answers = document.querySelectorAll('.answer'); 
        if (answers.length === 0) return;
        
        const isHidden = !answers[0].classList.contains('visible');
        answers.forEach(span => {
            span.classList.toggle('visible', isHidden);
        });
        revealBtn.textContent = isHidden ? 'Hide Answers' : 'Reveal Answers';
    }
</script>

</body>
</html>
